<style>
  /* Color de fondo por defecto de las filas */
  .wf-track-item {
      background-color: #1a1f24 !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
      transition: background 0.2s ease;
  }
  .wf-track-item i.icon-play-circle {
      color: #ff2a3b; /* Icono play en rojo */
  }
  .wf-track-item:hover {
      background-color: #222930 !important;
  }

  /* Estilo de resaltado rojo para el track activo */
  .wf-track-item.active-track {
      background-color: #ff2a3b !important;
  }
  .wf-track-item.active-track .wf-track-text,
  .wf-track-item.active-track i.icon-play-circle {
      color: #ffffff !important;
  }

  /* Botones Anterior/Siguiente */
  .wf-btn-control:hover {
      border-color: #ff2a3b !important;
      color: #ff2a3b !important;
  }
</style>

<script src="js/jquery-1.12.4.min.js"></script>
<script src="js/playerjs.js"></script>
<script>
   $(document).ready(function() {
       var currentTrackIndex = 0;
       var $playlistItems = $(".wf-track-item");
       var $trackTitle = $("#current-track-title");

       // Inicializar PlayerJS apuntando al contenedor vacío
       var player = new Playerjs({
           id: "playerjs-container",
           file: "mp3/01_WE_ARE.mp3"
       });

       function loadTrack(index, shouldPlay) {
           if(index >= 0 && index < $playlistItems.length) {
               $playlistItems.removeClass("active-track").css("background", "#1a1f24");
               currentTrackIndex = index;
               
               var $activeItem = $playlistItems.eq(currentTrackIndex);
               $activeItem.addClass("active-track").css("background", "#ff2a3b");
               
               var src = $activeItem.attr("data-src");
               var title = $activeItem.attr("data-title");
               
               $trackTitle.text(title);
               
               if (shouldPlay) {
                   player.api("play", src);
               } else {
                   player.api("file", src);
               }
           }
       }

       // Evento al terminar un tema: salta al siguiente de forma automática
       window.PlayerjsEvents = function(event, id, info) {
           if (event == "end" && id == "playerjs-container") {
               var nextIdx = currentTrackIndex + 1;
               if(nextIdx >= $playlistItems.length) {
                   nextIdx = 0;
               }
               loadTrack(nextIdx, true);
           }
       };

       // Click en la fila para seleccionar canción
       $(".wf-track-item").on("click", function(e) {
           if ($(e.target).closest('a[download]').length) {
               return; 
           }
           var idx = $playlistItems.index(this);
           loadTrack(idx, true);
       });

       // Botón Anterior externo
       $("#btn-prev").on("click", function(e) {
           e.preventDefault();
           var nextIdx = currentTrackIndex - 1;
           if(nextIdx < 0) {
               nextIdx = $playlistItems.length - 1;
           }
           loadTrack(nextIdx, true);
       });

       // Botón Siguiente externo
       $("#btn-next").on("click", function(e) {
           e.preventDefault();
           var nextIdx = currentTrackIndex + 1;
           if(nextIdx >= $playlistItems.length) {
               nextIdx = 0;
           }
           loadTrack(nextIdx, true);
       });
   });
</script>
